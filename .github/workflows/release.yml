name: Release Extension

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-from-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate extension files
        run: npm run check

      - name: Verify tag version matches manifest
        run: npm run verify:tag

      - name: Build extension zip
        run: npm run build:zip

      - name: Publish GitHub release (tag)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tabcleaner.zip
          generate_release_notes: true

  release-from-master:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate extension files
        run: npm run check

      - name: Build extension zip
        run: npm run build:zip

      - name: Compute release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          NAME="TabCleaner ${VERSION} (build ${GITHUB_RUN_NUMBER})"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release (master build)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: dist/tabcleaner.zip
